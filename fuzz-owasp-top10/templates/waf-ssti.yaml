id: waf-ssti-testing
info:
  name: WAF Efficacy Testing - Server-Side Template Injection
  author: your-name
  severity: info
  description: Testing WAF resilience against SSTI payloads across headers, query parameters, and body.
  tags: waf-test, ssti, fuzzing

variables:
  payload_list: ../payloads/ssti.txt

http:
  - raw:
      - |+
        GET /?query={{payloads}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 {{payloads}}
        Referer: https://example.com/{{payloads}}
        X-Forwarded-For: {{payloads}}
        Accept: */*

      - |+
        POST /submit HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        username=admin&data={{payloads}}

      - |+
        POST /api/update HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"search": "{{payloads}}", "filter": "1"}

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
