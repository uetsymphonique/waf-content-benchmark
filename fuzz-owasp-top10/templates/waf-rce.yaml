id: waf-rce-testing
info:
  name: WAF Efficacy Testing - Remote Code Execution (OS Command Fuzzing)
  author: your-name
  severity: info
  description: Sweeping massive chunks of RCE/OS Command Fuzzing payloads (over 100,000 permutations) to detect WAF capability in parsing complex encodings and shell execution environments.
  tags: waf-test, rce, os-command, fuzzing

variables:
  payload_list: ../payloads/rce_payloads.txt

http:
  - raw:
      - |+
        GET /ping?ip=127.0.0.1{{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 {{payloads}}
        Referer: https://google.com/search?q={{payloads}}

      - |+
        POST /api/exec HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        command=help&args={{payloads}}

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
