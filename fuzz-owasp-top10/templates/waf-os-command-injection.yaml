id: waf-os-command-injection-testing
info:
  name: WAF Efficacy Testing - OS Command Injection (OS-Command-Fuzzing)
  author: your-name
  severity: info
  description: Testing WAF capabilities against OS Command Injection using a comprehensive Fuzzing list. Covers Bash, PowerShell, Perl, and Windows cmd techniques.
  tags: waf-test, os-command, command-injection, rce, fuzzing

variables:
  payload_list: ../payloads/os-command-injection.txt

http:
  - raw:
      - |+
        GET /ping?host=127.0.0.1{{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 {{payloads}}
        Referer: https://google.com/search?q={{payloads}}

      - |+
        POST /api/utilities/ping HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        target=127.0.0.1&options={{payloads}}

      - |+
        POST /api/exec HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"command": "echo", "args": "{{payloads}}"}

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
