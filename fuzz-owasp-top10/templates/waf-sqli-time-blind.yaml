id: waf-sqli-time-blind-testing
info:
  name: WAF Efficacy Testing - SQLi (Time-Based & Blind)
  author: your-name
  severity: info
  description: Sending Time-Based Blind SQLi payloads to determine if WAF filters logical database pauses like SLEEP() or WAITFOR DELAY.
  tags: waf-test, sqli, time-based, blind

variables:
  payload_list: ../payloads/sqli_time_blind.txt

http:
  - raw:
      - |+
        GET /api/users?id=1'{{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        X-Forwarded-For: 127.0.0.1'{{payloads}}
        
      - |+
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        username=admin{{payloads}}&password=admin

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
