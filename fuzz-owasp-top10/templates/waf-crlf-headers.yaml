id: waf-crlf-headers-testing
info:
  name: WAF Efficacy Testing - CRLF Injection (Header Injection)
  author: your-name
  severity: info
  description: Testing WAF resilience against Raw CRLF injection payloads that aim to manipulate HTTP headers.
  tags: waf-test, crlf, fuzzing, headers

variables:
  payload_list: ../payloads/crlf.txt

http:
  - raw:
      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 {{url_decode(payloads)}}
        Referer: https://example.com/{{url_decode(payloads)}}
        X-Forwarded-For: {{url_decode(payloads)}}
        Accept: */*

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
