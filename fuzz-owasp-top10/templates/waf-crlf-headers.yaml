id: waf-crlf-headers-testing
info:
  name: WAF Efficacy Testing - CRLF Injection (Header Injection)
  author: your-name
  severity: info
  description: Testing WAF resilience against Raw CRLF injection payloads that aim to manipulate HTTP headers.
  tags: waf-test, crlf, fuzzing, headers

variables:
  # Trỏ tới kho đạn CRLF mặc định (Đã URL Encode)
  # Chúng ta sẽ dùng Helper Function của Nuclei để tự dịch ngược ra byte Raw lúc gửi
  payload_list: ../payloads/crlf.txt

http:
  - raw:
      # Kiểu 3: Fuzzing CRLF qua HTTP Headers truyền thống 
      # (CRLF nhắm vào Referer, User-Agent để đục thủng ghi log)
      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 {{url_decode(payloads)}}
        Referer: https://example.com/{{url_decode(payloads)}}
        X-Forwarded-For: {{url_decode(payloads)}}
        Accept: */*

    payloads:
      payloads:
        - "{{payload_list}}" # Load danh mục crlf_encoded.txt

    attack: batteringram

    # Dummy Matcher: Nhận diện mọi phản hồi để Nuclei Output thành JSON file 
    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
