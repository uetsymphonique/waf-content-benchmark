id: waf-nosql-testing
info:
  name: WAF Efficacy Testing - NoSQL Injection
  author: your-name
  severity: info
  description: Testing WAF resilience against NoSQL injection payloads specifically targeting URL query strings, application/x-www-form-urlencoded boundaries, and application/json bodies.
  tags: waf-test, nosql, fuzzing

variables:
  payload_list: ../payloads/nosql.txt

http:
  - raw:
      - |+
        GET /search?q={{payloads}}&id={{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: {{payloads}}
        X-Forwarded-For: {{payloads}}

      - |+
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        username=admin&password={{payloads}}

      - |+
        POST /api/v1/auth HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        
        {"username": "admin", "password": "{{payloads}}"}

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
