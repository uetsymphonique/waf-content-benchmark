id: waf-ssi-esi-testing
info:
  name: WAF Efficacy Testing - SSI and ESI Injection
  author: your-name
  severity: info
  description: Testing WAF resilience against Server Side Includes (SSI) and Edge Side Includes (ESI) injection payloads.
  tags: waf-test, ssi, esi, fuzzing

variables:
  payload_list: ../payloads/ssi_esi.txt

http:
  - raw:
      - |+
        GET /?page={{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        POST /comment HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        user=test&body={{payloads}}

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0
        X-Forwarded-For: {{payloads}}
        Cookie: session={{payloads}}
        Accept: */*

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
