id: waf-xss-brute-comprehensive-testing
info:
  name: WAF Efficacy Testing - XSS (Comprehensive Fuzzing)
  author: your-name
  severity: info
  description: A massive battery of XSS vectors compiled from JHADDIX, Mario, RSnake, and others to exhaustively fuzz WAF sanitization and encoding filters.
  tags: waf-test, xss, brute, fuzzing

variables:
  payload_list: ../payloads/xss_brute_comprehensive.txt

http:
  - raw:
      - |+
        GET /product?category=1&search={{payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html

      - |+
        POST /comment HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        id=7&feedback={{payloads}}

    payloads:
      payloads:
        - "{{payload_list}}"

    attack: batteringram

    unsafe: true
    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
