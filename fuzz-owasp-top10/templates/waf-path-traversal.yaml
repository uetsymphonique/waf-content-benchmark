id: waf-path-traversal-testing
info:
  name: WAF Efficacy Testing - Path Traversal (LFI / Directory Climbing)
  author: your-name
  severity: info
  description: Sweeping comprehensive Path Traversal techniques against headers and query parameters, utilizing basic encodings and DotDotPwn structures.
  tags: waf-test, lfi, traversal, fuzzing

variables:
  payload_list: ../payloads/path_traversal.txt

http:
  - raw:
      - |+
        GET /?file={{raw_payloads}}&download={{raw_payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        GET /{{raw_payloads}} HTTP/1.1
        Host: {{Hostname}}
        Accept: */*

      - |+
        GET / HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0
        X-Requested-With: {{raw_payloads}}
        X-Forwarded-For: {{raw_payloads}}
        Cookie: session={{raw_payloads}}

    payloads:
      raw_payloads:
        - "{{payload_list}}"
    preprocessors:
      - type: template
        generator:
          - replace("{{raw_payloads}}", "{{raw_payloads}}", "{{raw_payloads}}")
          - replace("{{raw_payloads}}", "{FILE}", "etc/passwd")
          - replace("{{raw_payloads}}", "{FILE}", "windows/win.ini")
    attack: clusterbomb

    matchers:
      - type: word
        part: header
        words:
          - "HTTP/"
