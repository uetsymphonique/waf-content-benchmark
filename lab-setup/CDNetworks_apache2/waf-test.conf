<VirtualHost *:80>
    ServerName waftest.mydomain.web

    # Allow semicolons and encoded characters in URLs
    AllowEncodedSlashes NoDecode
   
    ProxyPreserveHost On
    # Use 'nocanon' flag to prevent Apache from normalizing URLs (stripping semicolons)
    ProxyPass / http://127.0.0.1:5000/ nocanon
    ProxyPassReverse / http://127.0.0.1:5000/

    ErrorLog ${APACHE_LOG_DIR}/waf_test_error.log
    CustomLog ${APACHE_LOG_DIR}/waf_test_access.log combined
</VirtualHost>
